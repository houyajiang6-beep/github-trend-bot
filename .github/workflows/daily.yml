name: Daily GitHub Trend Report

on:
  # GitHub Actions cron uses UTC. 00:00 UTC = 08:00 Asia/Shanghai.
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-trend-bot-daily
  cancel-in-progress: false

jobs:
  daily-report:
    name: Generate and send daily report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      REPORT_TIMEZONE: Asia/Shanghai
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
      GMAIL_CREDENTIALS_FILE: credentials.json
      GMAIL_TOKEN_FILE: token.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore Gmail credentials from Secrets
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          files = {
              "GMAIL_CREDENTIALS_JSON": Path("credentials.json"),
              "GMAIL_TOKEN_JSON": Path("token.json"),
          }
          for secret_name, destination in files.items():
              value = os.environ.get(secret_name, "").strip()
              if not value:
                  raise RuntimeError(f"Required GitHub Secret is empty: {secret_name}")
              json.loads(value)
              destination.write_text(value, encoding="utf-8")
              destination.chmod(0o600)
              print(f"Restored and validated {destination.name}")
          PY

      - name: Validate runtime configuration
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import os

          required = ("DEEPSEEK_API_KEY", "GITHUB_TOKEN", "EMAIL_FROM", "EMAIL_TO")
          missing = [name for name in required if not os.environ.get(name, "").strip()]
          if missing:
              raise RuntimeError("Missing Actions configuration: " + ", ".join(missing))
          print("Runtime configuration is present (secret values are not printed).")
          PY

      - name: Generate report and send email
        id: run-bot
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p logs reports

          on_error() {
            status=$?
            echo "::error title=GitHub Trend Bot failed::main.py exited with status ${status}. See the diagnostic step and uploaded logs."
            exit "$status"
          }
          trap on_error ERR

          echo "::group::Runtime information"
          echo "Started at (Beijing): $(date '+%Y-%m-%d %H:%M:%S %Z')"
          python --version
          echo "::endgroup::"

          echo "::group::Application output"
          python main.py 2>&1 | tee logs/actions-run.log
          echo "::endgroup::"

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status_path = Path("logs/actions-status.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          if not status_path.exists():
              summary_path.write_text(
                  "## GitHub Trend Bot\n\n运行状态文件未生成，请检查失败步骤。\n",
                  encoding="utf-8",
              )
              print("::error title=Run status unavailable::logs/actions-status.json was not generated")
              raise SystemExit(0)

          status = json.loads(status_path.read_text(encoding="utf-8"))
          github = status["github"]
          deepseek = status["deepseek"]
          report = status["report"]
          gmail = status["gmail"]
          lines = [
              "## GitHub Trend Bot 运行摘要",
              "",
              f"- GitHub 抓取：{'成功' if github['success'] else '失败'}（{github['repositories']} 个项目）",
              f"- DeepSeek：{'成功' if deepseek['success'] else '降级'}（{deepseek['provider']} / {deepseek['model']}）",
              f"- 报告生成：{'成功' if report['success'] else '失败'}",
              f"- Gmail：{'跳过' if gmail['skipped'] else ('成功' if gmail['success'] else '失败')}",
              f"- AI 兜底：{'否' if not deepseek['fallback'] else '是'}",
          ]
          if deepseek["fallback"]:
              lines.append(f"- 降级原因：`{deepseek['reason']}`")
              print(f"::warning title=DeepSeek fallback::{deepseek['reason']}")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Print failure diagnostics
        if: failure()
        shell: bash
        run: |
          echo "::error title=Daily workflow failed::Review the failed step and the log output below."
          for log_file in logs/actions-run.log logs/github-trend-bot.log; do
            if [[ -f "$log_file" ]]; then
              echo "::group::Last 200 lines of ${log_file}"
              tail -n 200 "$log_file"
              echo "::endgroup::"
            fi
          done

      - name: Upload logs and generated reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: github-trend-bot-${{ github.run_id }}
          path: |
            logs/
            reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Remove temporary Gmail credentials
        if: always()
        shell: bash
        run: rm -f credentials.json token.json

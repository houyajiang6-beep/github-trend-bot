name: Daily GitHub Trend Report

on:
  # GitHub Actions cron uses UTC. 00:07 UTC = 08:07 Asia/Shanghai.
  # Avoid minute 0 because GitHub documents higher schedule load at each hour boundary.
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-trend-bot-daily
  cancel-in-progress: false

jobs:
  daily-report:
    name: Generate and send daily report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      REPORT_TIMEZONE: Asia/Shanghai
      ENABLE_DAILY_CONTENT_PIPELINE: "true"
      CREATOR_OUTPUT_DIR: outputs
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
      GMAIL_CREDENTIALS_FILE: credentials.json
      GMAIL_TOKEN_FILE: token.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Restore previous report snapshots
        uses: actions/cache/restore@v4
        with:
          path: |
            reports
            outputs/calibration
          key: github-trend-reports-${{ github.run_id }}
          restore-keys: |
            github-trend-reports-

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore Gmail credentials from Secrets
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          files = {
              "GMAIL_CREDENTIALS_JSON": Path("credentials.json"),
              "GMAIL_TOKEN_JSON": Path("token.json"),
          }
          for secret_name, destination in files.items():
              value = os.environ.get(secret_name, "").strip()
              if not value:
                  raise RuntimeError(f"Required GitHub Secret is empty: {secret_name}")
              json.loads(value)
              destination.write_text(value, encoding="utf-8")
              destination.chmod(0o600)
              print(f"Restored and validated {destination.name}")
          PY

      - name: Validate runtime configuration
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import os

          required = ("DEEPSEEK_API_KEY", "GITHUB_TOKEN", "EMAIL_FROM", "EMAIL_TO")
          missing = [name for name in required if not os.environ.get(name, "").strip()]
          if missing:
              raise RuntimeError("Missing Actions configuration: " + ", ".join(missing))
          print("Runtime configuration is present (secret values are not printed).")
          PY

      - name: Generate report and send email
        id: run-bot
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p logs reports outputs

          on_error() {
            status=$?
            echo "::error title=GitHub Trend Bot failed::main.py exited with status ${status}. See the diagnostic step and uploaded logs."
            exit "$status"
          }
          trap on_error ERR

          echo "::group::Runtime information"
          echo "Started at (Beijing): $(date '+%Y-%m-%d %H:%M:%S %Z')"
          python --version
          echo "::endgroup::"

          echo "::group::Application output"
          python main.py 2>&1 | tee logs/actions-run.log
          echo "::endgroup::"

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          status_path = Path("logs/actions-status.json")
          execution_path = Path("logs/execution_status.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          status = {}
          execution = {}
          if status_path.exists():
              status = json.loads(status_path.read_text(encoding="utf-8"))
          else:
              print("::error title=Run status unavailable::logs/actions-status.json was not generated")
          if execution_path.exists():
              execution = json.loads(execution_path.read_text(encoding="utf-8"))
          else:
              print("::error title=Execution status unavailable::logs/execution_status.json was not generated")

          github = status.get("github", {})
          deepseek = status.get("deepseek", {})
          gmail = status.get("gmail", {})
          market_insight = status.get("market_insight", {})
          social_content = status.get("social_content", {})
          creator_pipeline = execution.get("creator_pipeline", {})
          creator_status = creator_pipeline.get("status", "failed")
          selected_project = creator_pipeline.get("selected_project") or "未选出"
          trigger_type = os.environ.get("GITHUB_EVENT_NAME", "unknown")
          html_generated = any(Path("reports").glob("*.html"))
          json_generated = any(Path("reports").glob("*.json"))
          market_generated = bool(
              market_insight.get("generated")
              and any(Path("reports/market_insight").glob("*.json"))
          )
          content_generated = bool(
              social_content.get("generated")
              and any(Path("reports/content").glob("*.json"))
          )
          github_success = bool(github.get("success"))
          deepseek_success = bool(deepseek.get("success"))
          gmail_success = bool(gmail.get("success"))
          required_success = all(
              (
                  github_success,
                  html_generated,
                  json_generated,
                  market_generated,
                  content_generated,
                  gmail_success,
              )
          )
          any_fallback = any(
              (
                  deepseek.get("fallback", True),
                  market_insight.get("fallback", True),
                  social_content.get("fallback", True),
              )
          )
          if not required_success:
              final_status = "FAILED"
          elif (
              any_fallback
              or not deepseek_success
              or creator_status in {"failed", "degraded"}
          ):
              final_status = "DEGRADED"
          else:
              final_status = "SUCCESS"
          run_time = datetime.now(ZoneInfo("Asia/Shanghai")).strftime(
              "%Y-%m-%d %H:%M:%S %Z"
          )
          lines = [
              "## GitHub Trend Bot Report",
              "",
              f"运行时间：{run_time}",
              f"触发类型：{trigger_type}",
              "",
              "### GitHub抓取",
              f"- 状态：{'成功' if github_success else '失败'}",
              f"- 获取项目数量：{github.get('repositories', 0)}",
              "",
              "### DeepSeek",
              f"- 状态：{'成功' if deepseek_success else '失败'}",
              f"- 是否触发 fallback：{'是' if deepseek.get('fallback', True) else '否'}",
              "",
              "### 报告生成",
              f"- HTML：{'已生成' if html_generated else '未生成'}",
              f"- JSON：{'已生成' if json_generated else '未生成'}",
              "",
              "### v1.1 新增输出",
              f"- Market Insight 状态：{'成功' if market_insight.get('success') else '失败'}",
              f"- Market Insight 输出：{'已生成' if market_generated else '未生成'}",
              f"- Content Generator 状态：{'成功' if social_content.get('success') else '失败'}",
              f"- Content Generator 输出：{'已生成' if content_generated else '未生成'}",
              f"- Market Insight fallback：{'是' if market_insight.get('fallback', True) else '否'}",
              f"- Content Generator fallback：{'是' if social_content.get('fallback', True) else '否'}",
              "",
              "### Creator Pipeline",
              f"- 状态：{creator_status}",
              f"- 今日首选项目：{selected_project}",
              f"- Creator Ready 输出：{creator_pipeline.get('output') or '未生成'}",
              "",
              "### Gmail",
              f"- 状态：{'成功' if gmail_success else '失败'}",
              "",
              "### 整体状态",
              f"**{final_status}**",
          ]
          if deepseek.get("fallback", True):
              reason = deepseek.get("reason", "DeepSeek status unavailable")
              lines.insert(-2, f"- fallback 原因：`{reason}`")
              print(f"::warning title=DeepSeek fallback::{reason}")
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          PY

      - name: Cache report snapshots for growth comparison
        if: steps.run-bot.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            reports
            outputs/calibration
          key: github-trend-reports-${{ github.run_id }}

      - name: Print failure diagnostics
        if: failure()
        shell: bash
        run: |
          echo "::error title=Daily workflow failed::Review the failed step and the log output below."
          for log_file in logs/actions-run.log logs/github-trend-bot.log; do
            if [[ -f "$log_file" ]]; then
              echo "::group::Last 200 lines of ${log_file}"
              tail -n 200 "$log_file"
              echo "::endgroup::"
            fi
          done

      - name: Upload logs and generated reports
        id: upload-artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: github-trend-bot-${{ github.run_id }}
          path: |
            logs/
            reports/
            outputs/creator_ready/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Creator delivery summary
        if: always()
        shell: bash
        env:
          ARTIFACT_OUTCOME: ${{ steps.upload-artifact.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          execution_path = Path("logs/execution_status.json")
          creator = {}
          if execution_path.is_file():
              execution = json.loads(execution_path.read_text(encoding="utf-8"))
              creator = execution.get("creator_pipeline", {})
          status = str(creator.get("status") or "failed").upper()
          mode = str(creator.get("content_generation_mode") or "unknown")
          fallback_projects = creator.get("fallback_projects") or []
          fallback = mode in {"partial_fallback", "rules_fallback"}
          creator_files_exist = any(Path("outputs/creator_ready").glob("*/*"))
          artifact_uploaded = (
              os.environ.get("ARTIFACT_OUTCOME") == "success"
              and creator_files_exist
          )
          lines = [
              "",
              "## Creator Delivery",
              "",
              f"- Creator Pipeline：{status}",
              f"- 生成日期：{creator.get('publish_date') or '未知'}",
              f"- 今日首选：{creator.get('selected_project') or '未选出'}",
              f"- 候选数量：{creator.get('candidate_count', 0)}",
              f"- Artifact 已上传：{'是' if artifact_uploaded else '否'}",
              f"- Content Generator fallback：{'是' if fallback else '否'}",
              f"- Content Generator 模式：{mode}",
              "- fallback 项目：" + ("、".join(fallback_projects) if fallback_projects else "无"),
          ]
          reason = creator.get("degraded_reason") or creator.get("reason_code")
          if status in {"DEGRADED", "FAILED"}:
              lines.append(f"- 原因：{reason or '未提供'}")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("\n".join(lines) + "\n")
          PY

      - name: Remove temporary Gmail credentials
        if: always()
        shell: bash
        run: rm -f credentials.json token.json

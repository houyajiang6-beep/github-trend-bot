output_language_rules:
  - "先说普通用户获得的结果，再说项目名称"
  - "不得把 Star、开源、框架或技术协议本身当作普通人价值"
  - "避免 CLI、SDK、API、RAG、MCP 等术语；必须使用时用一句人话解释"
  - "没有事实支持时写不确定，不得伪造亲测"
  - "content_angle 必须包含具体人群、问题和可展示结果"
